set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'seebi/tmux-colors-solarized'
set -g mouse on
# Allow reordering tmux windows using Ctrl+Shift+Left/Right
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

set -g default-terminal "tmux-256color"
set -ga terminal-features ",*256col*:Tc"
set -g history-limit 50000        # larger scrollback
set -g focus-events on            # let vim/coc react to focus changes
set -g set-clipboard on           # use the terminal's clipboard
set -g allow-passthrough on
# set -g default-command /bin/zsh

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# default session tree to sort by time (recently used)
bind s choose-tree -Zs -O time

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# vim-style pane navigation with prefix
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Copy-paste: tmux-yank picks the right backend per OS (pbcopy / xclip / wl-copy /
# clip.exe on WSL), so no reattach-to-user-namespace needed on modern macOS.

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection and 'y'/Enter to yank to the system clipboard
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
# set-option -g renumber-windows on
set-option -g allow-rename off

# Fix escape on tmux
set -s escape-time 0
set -s extended-keys on

# Quick reload tmux conf
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Tmux resurrect config
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '60'  # autosave every 60 minutes

# Solarized Theme
set -g @colors-solarized 'dark'

# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 60
set -g status-left '#[fg=green]#S #[fg=yellow]#I/#[fg=cyan]#P '
set -g status-right '#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M '

# Auto-install tpm on first run so a fresh machine bootstraps itself
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'

# Local machine overrides
source-file -q ~/.tmux.conf.local
